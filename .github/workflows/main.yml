name: Build and Release Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    env:
      Solution_Name: ssh-vpn.sln
      Release_Path: ssh-vpn/bin/Release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: msbuild $env:Solution_Name /t:Restore

    - name: Build the solution
      run: msbuild $env:Solution_Name /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create Zip Archive
      shell: pwsh
      run: Compress-Archive -Path ${{ env.Release_Path }}\* -DestinationPath ssh-vpn.zip

    - name: Create Release and Tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.Release_Path }}/ssh-vpn.exe
          ssh-vpn.zip
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
