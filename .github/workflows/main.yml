name: Build and Release Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  # Build Tauri application
  build:
    name: Build Tauri
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ssh-vpn-tauri
    env:
      CARGO_TELEMETRY_URL: ""

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ssh-vpn-tauri/package-lock.json

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@v1
      
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ssh-vpn-tauri/src-tauri

    - name: Install dependencies
      run: npm ci

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: 'SSH VPN Tauri v__VERSION__'
        releaseBody: |
          See the assets for this release.
          Download the installer and run it.
        releaseDraft: false
        prerelease: false
        artifactsPath: ''
