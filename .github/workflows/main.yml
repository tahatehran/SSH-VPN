name: SSH VPN Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: windows-latest
    env:
      Solution_Name: ssh-vpn.sln

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Install WiX Toolset
      run: choco install wixtoolset -y --no-progress

    - name: Create Directory.Build.props to set WixToolPath
      shell: pwsh
      run: |
        $wixBinPath = Split-Path (Get-Command candle -ErrorAction Stop).Source -Parent
        Write-Host "WiX Toolset bin path is: $wixBinPath"
        $propsContent = "<Project><PropertyGroup><WixToolPath>$wixBinPath</WixToolPath></PropertyGroup></Project>"
        Set-Content -Path "Directory.Build.props" -Value $propsContent
        Write-Host "Successfully created Directory.Build.props"

    - name: Restore NuGet Packages
      run: msbuild $env:Solution_Name /t:Restore

    - name: Build the solution
      run: msbuild $env:Solution_Name /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ssh-vpn-release
        path: "**/bin/Release/"
