name: SSH VPN Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: windows-latest
    env:
      Solution_Name: ssh-vpn.sln
      Build_Platform: x86

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Install WiX Toolset
      run: choco install wixtoolset -y --no-progress

    - name: Configure WiX Toolset Path
      id: wix_path
      shell: pwsh
      run: |
        $wixBin = Split-Path (Get-Command candle -ErrorAction Stop).Source -Parent
        "WixToolPath=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "WiX Toolset path is set to: $wixBin"

    - name: Restore NuGet Packages
      run: msbuild $env:Solution_Name /t:Restore /p:Platform=$env:Build_Platform

    - name: Build the application
      run: msbuild ssh-vpn\ssh-vpn.csproj /p:Configuration=Release /p:Platform=$env:Build_Platform /p:OutputPath=bin\Release

    - name: Build the installer
      run: msbuild ssh-vpn.Setup\ssh-vpn.Setup.wixproj /p:Configuration=Release /p:Platform=$env:Build_Platform /p:OutputPath=release\ /p:WixToolPath="$env:WixToolPath"

    - name: Stage application executable
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path release -Force | Out-Null
        Copy-Item -Path "ssh-vpn\bin\Release\ssh-vpn.exe" -Destination "release\ssh-vpn.exe"

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ssh-vpn-release
        path: release/
