name: SSH VPN Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: windows-latest
    env:
      Solution_Name: ssh-vpn.sln

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Install WiX Toolset
      run: choco install wixtoolset -y --no-progress

    - name: Configure WiX Toolset Path
      id: wix_path
      shell: pwsh
      run: |
        $wixBin = Split-Path (Get-Command candle -ErrorAction Stop).Source -Parent
        "WixToolPath=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "WiX Toolset path is set to: $wixBin"

    - name: Restore NuGet Packages
      run: msbuild $env:Solution_Name /t:Restore /p:WixToolPath="$env:WixToolPath"

    - name: Build the solution (Release)
      run: msbuild $env:Solution_Name /p:Configuration=Release /p:Platform="Any CPU" /p:OutputPath=release\ /p:WixToolPath="$env:WixToolPath"

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ssh-vpn-release
        path: release/

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Unified Cleanup
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
    - name: Purge Temporary Files
      run: |
        echo "Cleaning up temporary build artifacts and logs..."
