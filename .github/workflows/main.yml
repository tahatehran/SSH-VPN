name: Build and Release Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Release Management"]
    types: [completed]

jobs:
  # Build Tauri application
  build:
    name: Build Tauri
    runs-on: windows-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: ssh-vpn-tauri
    env:
      CARGO_TELEMETRY_URL: ""

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Fetch all history for tags and branches
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc
      
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ssh-vpn-tauri/src-tauri

    - name: Install dependencies
      run: npm install

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: 'SSH VPN Tauri v__VERSION__'
        releaseBody: |
          See the assets for this release.
          Download the installer and run it.
        releaseDraft: false
        prerelease: false
