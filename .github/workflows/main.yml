name: SSH VPN Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  # Job 1: Build the C# Windows Application
  build:
    name: Build Application
    runs-on: windows-latest
    env:
      Solution_Name: ssh-vpn.sln

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Install WiX Toolset
      run: choco install wixtoolset -y

    - name: Configure WiX Toolset Path
      shell: pwsh
      run: |
        $roots = @(
          "${env:ProgramFiles(x86)}\WiX Toolset*",
          "${env:ProgramFiles}\WiX Toolset*",
          "${env:ChocolateyInstall}\lib\wix*",
          $env:WIX
        )

        foreach ($root in $roots) {
          if (-not $root) { continue }
          $wixTargets = Get-ChildItem $root -Recurse -Filter wix.targets -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wixTargets) {
            $wixBin = Split-Path $wixTargets.FullName -Parent
            Add-Content $env:GITHUB_ENV "WixToolPath=$wixBin"
            Write-Host "WiX Toolset path: $wixBin"
            exit 0
          }
        }

        Get-Command candle -ErrorAction SilentlyContinue | Format-List | Out-String | Write-Host
        throw "WiX Toolset not found"

    - name: Restore NuGet Packages
      run: nuget restore $env:Solution_Name

    - name: Build the solution (Release x64)
      run: msbuild $env:Solution_Name /p:Configuration=Release /p:Platform=x64

    - name: Build installer (Release x86)
      run: msbuild ssh-vpn.Setup\ssh-vpn.Setup.wixproj /p:Configuration=Release /p:Platform=x86

    - name: Prepare Release Files
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path release -Force | Out-Null
        Copy-Item -Path ssh-vpn\bin\x64\Release\ssh-vpn.exe -Destination release\ssh-vpn.exe
        Copy-Item -Path ssh-vpn.Setup\bin\x86\Release\ssh-vpn.Setup.msi -Destination release\ssh-vpn.Setup.msi

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ssh-vpn-release
        path: release/

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Unified Cleanup
  cleanup:
    name: Unified Cleanup
    runs-on: ubuntu-latest
    needs: [build]
    if: always() # Run even if build fails to ensure workspace is clean
    steps:
    - name: Purge Temporary Files
      run: |
        echo "Cleaning up temporary build artifacts and logs..."
        # In a real runner, the environment is ephemeral, but this is a placeholder
        # for any specific cleanup logic requested.
