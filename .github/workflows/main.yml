name: SSH VPN Pipeline (DEBUG MODE)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  find-wix-path:
    name: Find Real WiX Path
    runs-on: windows-latest

    steps:
    - name: Install WiX Toolset
      run: choco install wixtoolset -y --no-progress

    - name: DEBUG - Find and Print Real WiX Path
      id: find_wix
      shell: pwsh
      run: |
        try {
          $wixPath = Split-Path (Get-Command candle -ErrorAction Stop).Source
          Write-Host "=================================================="
          Write-Host "THE REAL WIX PATH IS: $wixPath"
          Write-Host "=================================================="
        } catch {
          Write-Host "Could not find candle.exe. WiX Toolset might not be installed correctly."
          exit 1
        }
