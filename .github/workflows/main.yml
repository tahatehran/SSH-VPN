name: Build and Release Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    env:
      Solution_Name: ssh-vpn.sln

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Fetch all history for accurate versioning
        fetch-depth: 0

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: msbuild $env:Solution_Name /t:Restore

    - name: Build the solution
      run: msbuild $env:Solution_Name /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Application Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ssh-vpn-application
        path: ssh-vpn/bin/Release/

    - name: Create Release and Tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: ssh-vpn/bin/Release/*
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
