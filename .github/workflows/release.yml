name: CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  # Bump version on every push (except version bump commits)
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      should_bump: ${{ steps.skip_check.outputs.skip }}
      new_version: ${{ steps.version.outputs.new_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already a version bump commit
        id: skip_check
        run: |
          COMMIT_MSG=$(git log -1 --format=%s)
          if echo "$COMMIT_MSG" | grep -q "chore: bump version"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version (0.0.1 patch increment)
        if: steps.skip_check.outputs.skip == 'false'
        id: version
        run: |
          CURRENT_VERSION=$(grep '"version"' ssh-vpn-tauri/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"
          
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          new_patch=$((patch + 1))
          NEW_VERSION="$major.$minor.$new_patch"
          echo "New version: $NEW_VERSION (+0.0.1)"
          
          sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" ssh-vpn-tauri/package.json
          if [ -f ssh-vpn-tauri/src-tauri/tauri.conf.json ]; then
            sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" ssh-vpn-tauri/src-tauri/tauri.conf.json
          fi
          if [ -f ssh-vpn-tauri/src-tauri/Cargo.toml ]; then
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" ssh-vpn-tauri/src-tauri/Cargo.toml
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ssh-vpn-tauri/package.json ssh-vpn-tauri/src-tauri/tauri.conf.json ssh-vpn-tauri/src-tauri/Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin master || git push https://github.com/${{ github.repository }}.git HEAD:master

  # Build Tauri application
  build:
    name: Build Tauri
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ssh-vpn-tauri
    env:
      CARGO_TELEMETRY_URL: ""

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc
      
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ssh-vpn-tauri/src-tauri


    - name: Download Wintun DLL
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile "wintun.zip"
        Expand-Archive -Path "wintun.zip" -DestinationPath "wintun_extract"
        Copy-Item "wintun_extract/wintun/bin/amd64/wintun.dll" -Destination "src-tauri/wintun.dll"

    - name: Install dependencies
      run: npm install

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: 'SSH VPN Tauri v__VERSION__'
        releaseBody: |
          See the assets for this release.
          Download the installer and run it.
        releaseDraft: false
        prerelease: false
