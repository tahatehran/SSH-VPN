name: Release Management

on:
  push:
    branches:
      - master

jobs:
  bump-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already a version bump commit
        id: skip_check
        run: |
          COMMIT_MSG=$(git log -1 --format=%s)
          if echo "$COMMIT_MSG" | grep -q "chore: bump version"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping - this is already a version bump commit"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version (0.0.1 patch increment)
        if: steps.skip_check.outputs.skip == 'false'
        id: version
        run: |
          CURRENT_VERSION=$(grep '"version"' ssh-vpn-tauri/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "Current version from package.json: $CURRENT_VERSION"
          
          # Parse version parts
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          
          # Always increment patch by 1 (0.0.1 style)
          new_patch=$((patch + 1))
          
          NEW_VERSION="$major.$minor.$new_patch"
          echo "New version: $NEW_VERSION (+0.0.1)"
          
          # Update package.json (tauri-action reads from here!)
          sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" ssh-vpn-tauri/package.json
          
          # Also update tauri.conf.json (bundle version)
          if [ -f ssh-vpn-tauri/src-tauri/tauri.conf.json ]; then
            sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" ssh-vpn-tauri/src-tauri/tauri.conf.json
          fi
          
          # Also update Cargo.toml for consistency
          if [ -f ssh-vpn-tauri/src-tauri/Cargo.toml ]; then
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" ssh-vpn-tauri/src-tauri/Cargo.toml
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ssh-vpn-tauri/package.json ssh-vpn-tauri/src-tauri/tauri.conf.json ssh-vpn-tauri/src-tauri/Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin master

      - name: Create GitHub Release
        if: steps.skip_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
