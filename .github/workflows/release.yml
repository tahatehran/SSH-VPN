name: Release Management

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: false
        type: string

jobs:
  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=${{ github.event.inputs.version }}
          if [ -z "$VERSION" ]; then
            # Get current version from package.json
            VERSION=$(grep '"version"' ssh-vpn-tauri/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.git.createTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ steps.version.outputs.tag }}',
              message: 'Release ${{ steps.version.outputs.tag }}',
              object: context.sha,
              type: 'commit'
            })

      - name: Push tag
        run: |
          git push origin ${{ steps.version.outputs.tag }}

  changelog:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG="v$(grep '"version"' ssh-vpn-tauri/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')"
          
          if [ -z "$PREV_TAG" ]; then
            # No previous tag, get all commits
            CHANGELOG=$(git log --oneline --format="* %s" | head -30)
          else
            # Get commits since last tag
            CHANGELOG=$(git log $PREV_TAG..HEAD --oneline --format="* %s")
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## $CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Release Notes Draft',
              body: 'Draft release notes:\n\n${{ steps.changelog.outputs.changelog }}'
            })
